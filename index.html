<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#007bff">
    <title>Controle de Gastos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: "💰";
            font-size: 32px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        .total-card {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            text-align: center;
        }

        .total-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .total-value {
            font-size: 36px;
            font-weight: bold;
        }

        .gasto-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gasto-info {
            flex: 1;
        }

        .gasto-categoria {
            font-weight: 600;
            color: #007bff;
        }

        .gasto-descricao {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .gastro-valor {
            font-weight: bold;
            font-size: 18px;
            color: #28a745;
        }

        .gasto-data {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .error {
            color: #dc3545;
            text-align: center;
            padding: 10px;
        }

        .categorias {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .cat-btn {
            background: #e9ecef;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .cat-btn.selected {
            background: #007bff;
            color: white;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .total-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Controle de Gastos</h1>

        <!-- Card de Total -->
        <div class="card total-card">
            <h3>💰 Total Gasto</h3>
            <div class="total-value" id="totalValue">R$ 0,00</div>
        </div>

        <!-- Formulário -->
        <div class="card">
            <div class="form-group">
                <label>💵 Valor (R$)</label>
                <input type="number" id="valor" step="0.01" placeholder="0,00">
            </div>

            <div class="form-group">
                <label>📂 Categoria</label>
                <select id="categoria">
                    <option value="Alimentação">🍔 Alimentação</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Moradia">🏠 Moradia</option>
                    <option value="Lazer">🎬 Lazer</option>
                    <option value="Saúde">💊 Saúde</option>
                    <option value="Educação">📚 Educação</option>
                    <option value="Outros">📌 Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label>📝 Descrição</label>
                <input type="text" id="descricao" placeholder="Ex: Almoço, Cinema, Uber...">
            </div>

            <div class="form-group">
                <label>📅 Data</label>
                <input type="date" id="data">
            </div>

            <button onclick="enviarGasto()">➕ Registrar Gasto</button>
        </div>

        <!-- Lista de Gastos -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">📋 Últimos Gastos</h3>
            <div id="listaGastos">
                <div class="loading">Carregando...</div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ COLOQUE SUA URL DA API AQUI ⚠️
        const API_URL = 'https://jg3pm7e5b2.execute-api.us-east-2.amazonaws.com/default/minha-primeira-lambda';
        // Função para formatar moeda
        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        // Função para formatar data
        function formatarData(dataStr) {
            if (!dataStr) return '';
            const data = new Date(dataStr);
            return data.toLocaleDateString('pt-BR');
        }

        // Carregar total
        async function carregarTotal() {
            try {
                const response = await fetch(`${API_URL}?total=true`);
                const data = await response.json();
                document.getElementById('totalValue').innerText = formatarMoeda(data.total_gastos || 0);
            } catch (error) {
                console.error('Erro ao carregar total:', error);
            }
        }

        // Carregar lista de gastos
        async function carregarGastos() {
            try {
                const response = await fetch(API_URL);
                const gastos = await response.json();

                const listaDiv = document.getElementById('listaGastos');

                if (!gastos.length) {
                    listaDiv.innerHTML = '<div class="loading">📭 Nenhum gasto registrado ainda</div>';
                    return;
                }

                listaDiv.innerHTML = gastos.map(gasto => `
                    <div class="gasto-item">
                        <div class="gasto-info">
                            <div class="gasto-categoria">${gasto.categoria || 'Sem categoria'}</div>
                            <div class="gasto-descricao">${gasto.descricao || 'Sem descrição'}</div>
                            <div class="gasto-data">${formatarData(gasto.data)}</div>
                        </div>
                        <div class="gastro-valor">${formatarMoeda(gasto.valor || 0)}</div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Erro ao carregar gastos:', error);
                document.getElementById('listaGastos').innerHTML = '<div class="error">❌ Erro ao carregar gastos</div>';
            }
        }

        // Enviar gasto
        async function enviarGasto() {
            const valor = document.getElementById('valor').value;
            const categoria = document.getElementById('categoria').value;
            const descricao = document.getElementById('descricao').value;
            let data = document.getElementById('data').value;

            if (!valor || valor <= 0) {
                alert('Por favor, informe um valor válido');
                return;
            }

            if (!data) {
                data = new Date().toISOString().split('T')[0];
            }

            const gasto = {
                valor: parseFloat(valor),
                categoria: categoria,
                descricao: descricao || 'Sem descrição',
                data: data
            };

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '⏳ Enviando...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(gasto)
                });

                if (response.ok) {
                    // Limpa formulário
                    document.getElementById('valor').value = '';
                    document.getElementById('descricao').value = '';
                    document.getElementById('data').value = '';

                    // Recarrega dados
                    await carregarGastos();
                    await carregarTotal();

                    alert('✅ Gasto registrado com sucesso!');
                } else {
                    alert('❌ Erro ao registrar gasto');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro de conexão com o servidor');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Carregar tudo ao iniciar
        carregarGastos();
        carregarTotal();

        // Preencher data atual
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
